<section class="create-wallet page-layout">
  <app-page-header
    eyebrow="Cofre de carteiras"
    title="Criar carteira"
    description="Gere uma carteira local para assinar eventos financeiros com chave privada criptografada."
  />

  <app-section-card class="wallet-form">
    <form (submit)="submit(); $event.preventDefault()">
      <label>
        <span>Nome do proprietário</span>
        <input
          class="form-control"
          type="text"
          [value]="createWalletDto().ownerName"
          (input)="createWalletDto.set({ ownerName: $any($event.target).value })"
        />
      </label>

      <button class="primary-action" type="submit" [disabled]="isLoading()">Criar carteira</button>
    </form>
  </app-section-card>

  @if (errorMessage()) {
    <p class="message error">{{ errorMessage() }}</p>
  }

  @if (createdWallet()) {
    <app-section-card class="wallet-result" title="Carteira criada">
      <label>
        <span>Endereço</span>
        <textarea class="form-control" readonly rows="3">{{ createdWallet()?.address }}</textarea>
      </label>

      <label>
        <span>Chave pública</span>
        <textarea class="form-control" readonly rows="5">{{ createdWallet()?.publicKey }}</textarea>
      </label>

      <label>
        <span>Chave privada</span>
        <textarea class="form-control" readonly rows="5">{{ createdWallet()?.privateKey }}</textarea>
      </label>

      <h3>Salvar no cofre local</h3>

      <label>
        <span>Senha local</span>
        <input
          class="form-control"
          type="password"
          [value]="vaultPassword()"
          (input)="vaultPassword.set($any($event.target).value)"
        />
      </label>

      <label>
        <span>Confirmar senha</span>
        <input
          class="form-control"
          type="password"
          [value]="confirmVaultPassword()"
          (input)="confirmVaultPassword.set($any($event.target).value)"
        />
      </label>

      <button class="primary-action" type="button" (click)="saveInVault()" [disabled]="isLoading()">
        Salvar carteira criptografada
      </button>

      @if (vaultSaved()) {
        <p class="message success">Carteira salva localmente com a chave privada criptografada.</p>
      }
    </app-section-card>
  }
</section>

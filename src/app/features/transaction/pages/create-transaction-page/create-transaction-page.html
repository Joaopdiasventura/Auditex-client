<section class="create-event-page page-layout">
  <app-page-header
    eyebrow="Criar evento financeiro"
    title="Registrar evidência auditável de processamento"
    description="Assine localmente um evento de processamento financeiro e envie ao ledger imutável."
  >
    <a class="secondary-action" routerLink="/ledger">Abrir ledger</a>
  </app-page-header>

  @if (wallets().length === 0) {
    <app-empty-state title="Nenhuma carteira local encontrada" message="Crie ou importe uma carteira antes de registrar eventos financeiros.">
      <a class="primary-action" routerLink="/wallet/create">Criar carteira</a>
    </app-empty-state>
  } @else {
    <form class="form-grid" (submit)="submit(); $event.preventDefault()">
      <app-section-card title="Dados financeiros">
        <label>
          <span>Nome do arquivo</span>
          <input
            class="form-control"
            type="text"
            [value]="form().fileName"
            (input)="updateField('fileName', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Quantidade de registros</span>
          <input
            class="form-control"
            type="number"
            [value]="form().recordsCount"
            (input)="updateField('recordsCount', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Registros processados</span>
          <input
            class="form-control"
            type="number"
            [value]="form().recordsProcessed"
            (input)="updateField('recordsProcessed', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Valor total</span>
          <input
            class="form-control"
            type="number"
            step="0.01"
            [value]="form().totalAmount"
            (input)="updateField('totalAmount', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Moeda</span>
          <input
            class="form-control"
            type="text"
            [value]="form().currency"
            (input)="updateField('currency', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Origem</span>
          <input
            class="form-control"
            type="text"
            [value]="form().source"
            (input)="updateField('source', $any($event.target).value)"
          />
        </label>
      </app-section-card>

      <app-section-card title="Resultado da validação">
        <label>
          <span>Tipo de divergência</span>
          <input
            class="form-control"
            type="text"
            [value]="form().divergenceType"
            (input)="updateField('divergenceType', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Valor esperado</span>
          <input
            class="form-control"
            type="number"
            step="0.01"
            [value]="form().expectedAmount"
            (input)="updateField('expectedAmount', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Valor encontrado</span>
          <input
            class="form-control"
            type="number"
            step="0.01"
            [value]="form().actualAmount"
            (input)="updateField('actualAmount', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Registros afetados</span>
          <input
            class="form-control"
            type="number"
            [value]="form().affectedRecords"
            (input)="updateField('affectedRecords', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Divergências encontradas</span>
          <input
            class="form-control"
            type="number"
            [value]="form().divergencesFound"
            (input)="updateField('divergencesFound', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Duração em ms</span>
          <input
            class="form-control"
            type="number"
            [value]="form().durationMs"
            (input)="updateField('durationMs', $any($event.target).value)"
          />
        </label>

        <label>
          <span>Status</span>
          <input
            class="form-control"
            type="text"
            [value]="form().status"
            (input)="updateField('status', $any($event.target).value)"
          />
        </label>
      </app-section-card>
      <app-section-card title="Identidade do evento">
        <label>
          <span>Carteira</span>
          <select
            class="form-control"
            [value]="selectedAddress()"
            (change)="updateSelectedAddress($any($event.target).value)"
          >
            @for (wallet of wallets(); track wallet.address) {
              <option [value]="wallet.address">
                {{ wallet.ownerName }} · {{ formatAddress(wallet.address) }}
              </option>
            }
          </select>
        </label>

        <label>
          <span>Tipo de evento</span>
          <select class="form-control" [value]="form().type" (change)="updateField('type', $any($event.target).value)">
            @for (type of eventTypes; track type) {
              <option [value]="type">{{ labels[type] }}</option>
            }
          </select>
        </label>

        <label>
          <span>ID do processamento</span>
          <div class="inline-field">
            <input
              class="form-control"
              type="text"
              [value]="form().processingId"
              (input)="updateField('processingId', $any($event.target).value)"
            />
            <button class="secondary-action" type="button" (click)="regenerateProcessingId()">Novo</button>
          </div>
        </label>

        <label>
          <span>Hash do arquivo</span>
          <input
            class="form-control"
            type="text"
            [value]="form().fileHash"
            (input)="updateField('fileHash', $any($event.target).value)"
          />
        </label>
      </app-section-card>

      <app-section-card title="Assinatura">
        <label>
          <span>Senha da carteira local</span>
          <input
            class="form-control"
            type="password"
            [value]="form().password"
            (input)="updateField('password', $any($event.target).value)"
          />
        </label>

        <app-json-preview [value]="previewPayloadValue()" />

        @if (errorMessage()) {
          <p class="message error">{{ errorMessage() }}</p>
        }

        @if (successMessage()) {
          <p class="message success">{{ successMessage() }}</p>
        }

        @if (transactionHash()) {
          <div class="result">
            <span>Hash da transação</span>
            <app-hash-value [value]="transactionHash()" [head]="24" [tail]="18" />
          </div>
        }

        <button class="primary-action submit" type="submit" [disabled]="isLoading()">
          @if (isLoading()) {
            Assinando...
          } @else {
            Assinar e enviar evento
          }
        </button>
      </app-section-card>
    </form>
  }
</section>
